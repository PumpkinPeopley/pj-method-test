<!DOCTYPE html>
<html>
<head>
    <title>Google Site</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        #content-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- This div will hold the pulled content -->
    <div id="site-container" style="width:100%; height:100%;">Loading...</div>

    <script>
        // Uses the active AllOrigins proxy to bypass Google's block
        const targetUrl = 'https://sites.google.com/portlandct.us/thepjmethod/home';
        const proxyUrl = `https://allorigins.win{encodeURIComponent(targetUrl)}`;

        fetch(proxyUrl)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Network response was not ok.');
            })
            .then(data => {
                const container = document.getElementById('site-container');
                container.innerHTML = ''; // Clear the loading text
               
                // Create a blank iframe and inject the clean HTML data directly
                const iframe = document.createElement('iframe');
                iframe.id = 'content-frame';
                container.appendChild(iframe);
               
                const iframeDoc = iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(data.contents);
                iframeDoc.close();
            })
            .catch(err => {
                document.getElementById('site-container').innerHTML = 'Error loading the page.';
                console.error(err);
            });
    </script>

</body>
</html>
